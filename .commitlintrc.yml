extends:
  - '@commitlint/config-conventional'

rules:
  # Allow long headers, bodies, and footers for detailed commit messages
  header-max-length: [1, always, 120]
  body-max-line-length: [0]
  footer-max-line-length: [0]
  # Don't enforce sentence case on subjects
  subject-case: [0]
  # Allow project-specific scoping types used in historical commits
  type-enum:
    - 2
    - always
    - [build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test,
       assets, benchmark, compose, core, engine, renderer]
