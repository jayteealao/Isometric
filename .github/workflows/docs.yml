name: Deploy docs

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'isometric-core/src/main/**'
      - 'isometric-compose/src/main/**'
      - 'build.gradle'
      - '**/*.gradle.kts'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Android SDK (compileSdk 34) is pre-installed on ubuntu-latest
      # with ANDROID_HOME already set — no additional setup required.
      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate Dokka API docs
        run: ./gradlew :dokkaGeneratePublicationHtml

      - name: Copy Dokka output into site
        run: cp -r build/dokka/html site/public/api

      - name: Build docs site
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline --include-fragments --root-dir site/dist site/dist/
          fail: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
