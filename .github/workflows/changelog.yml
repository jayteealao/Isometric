name: Update Changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to generate changelog for (e.g., v1.1.0) — leave blank for unreleased"
        required: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git-cliff

      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff /usr/local/bin/

      - name: Generate changelog
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            git cliff -o CHANGELOG.md --tag "${{ inputs.version }}"
          else
            git cliff -o CHANGELOG.md
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md"
          git push
