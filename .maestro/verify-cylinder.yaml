appId: io.github.jayteealao.isometric.sample
name: "uv-generation-cylinder verification"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Navigate to Textured Materials demo from the chooser.
- tapOn: "Textured Materials"
- waitForAnimationToEnd
- assertVisible: "Textured Materials"
- assertVisible: "Full WebGPU"

# Cylinder tab is the 4th (scrollable) tab — Prism, Octahedron, Pyramid,
# Cylinder, Stairs, Knot (post-webgpu-ngon-faces 6 tabs total). Cylinder is
# still visible without a swipe in the default tab-row layout because it sits
# at the right edge of the initial viewport. Tap by explicit point because
# Maestro text-match on ScrollableTabRow Tab does not route to onClick.
- tapOn:
    point: "93%,4%"
- waitForAnimationToEnd

# Three cylinders in this scene (post-webgpu-ngon-faces): textured 12-vert,
# perFace 12-vert, textured 24-vert (rightmost — validates AC1 of
# webgpu-ngon-faces).
# Canvas mode — AC1 (side wraps without seam smear at u=1/u=0 boundary),
# AC2 (top/bottom caps), AC3 (per-face red/blue colors + brick sides).
- takeScreenshot: screenshots/verify-cylinder-canvas

# Full WebGPU mode — POST-webgpu-ngon-faces this MUST render the 24-vert cap
# as a full brick disk (the offset+length UV table now serves all N up to 24).
# Pre-slice this rendered as a partial wedge.
- tapOn: "Full WebGPU"
- waitForAnimationToEnd
- takeScreenshot: screenshots/verify-cylinder-webgpu

# Hybrid Canvas + GPU-sort path.
- tapOn: "Canvas + GPU Sort"
- waitForAnimationToEnd
- takeScreenshot: screenshots/verify-cylinder-canvas-gpusort

# Cycle back to Canvas to confirm no state corruption after toggling backends.
- tapOn: "Canvas"
- waitForAnimationToEnd
- takeScreenshot: screenshots/verify-cylinder-canvas-cycle-back
