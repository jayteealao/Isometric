appId: io.github.jayteealao.isometric.sample
name: "uv-generation-cylinder verification"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Navigate to Textured Materials demo from the chooser.
- tapOn: "Textured Materials"
- waitForAnimationToEnd
- assertVisible: "Textured Materials"
- assertVisible: "Full WebGPU"

# Cylinder tab is the 4th (scrollable) tab — Prism, Octahedron, Pyramid, Cylinder.
# Tap by explicit point because Maestro's text-match on the ScrollableTabRow Tab
# does not route to the Tab onClick on this device. Coordinate derived from
# `uiautomator dump` tab bounds on 1080x2400 (Cylinder sits at roughly x=93%).
- tapOn:
    point: "93%,4%"
- waitForAnimationToEnd

# Canvas mode — AC1 (side wraps without seam smear at u=1/u=0 boundary),
# AC2 (top/bottom caps), AC3 (per-face red/blue colors + brick sides).
- takeScreenshot: screenshots/verify-cylinder-canvas

# Full WebGPU mode — side-face parity expected; caps degrade at N > 6 per
# the documented GpuUvCoordsBuffer N>6 cap truncation.
- tapOn: "Full WebGPU"
- waitForAnimationToEnd
- takeScreenshot: screenshots/verify-cylinder-webgpu

# Hybrid Canvas + GPU-sort path.
- tapOn: "Canvas + GPU Sort"
- waitForAnimationToEnd
- takeScreenshot: screenshots/verify-cylinder-canvas-gpusort

# Cycle back to Canvas to confirm no state corruption after toggling backends.
- tapOn: "Canvas"
- waitForAnimationToEnd
- takeScreenshot: screenshots/verify-cylinder-canvas-cycle-back
