appId: io.fabianterhorst.isometric.sample
name: "Runtime API - Hierarchy with rotating groups"
---
# Navigate from chooser to Runtime API
- tapOn: "Runtime API"
- waitForAnimationToEnd

# Navigate to Hierarchy tab
- tapOn: "Hierarchy"
- waitForAnimationToEnd

# Take first screenshot of rotating groups
- takeScreenshot: screenshots/03_hierarchy_frame1

# Wait and take another
- tapOn: "Hierarchy"
- waitForAnimationToEnd
- takeScreenshot: screenshots/03_hierarchy_frame2
