appId: io.github.jayteealao.isometric.sample
name: "Runtime API - Stack screen"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Navigate from chooser to Runtime API
- tapOn: "Runtime API"
- waitForAnimationToEnd

# Swipe tab row left to reveal Stack tab (swipe within tab bar area ~4% height)
- swipe:
    start: 90%, 4%
    end: 10%, 4%
- waitForAnimationToEnd

# Tap Stack tab
- tapOn: "Stack"
- waitForAnimationToEnd

# Take screenshots
- takeScreenshot: screenshots/stack_01
