appId: io.github.jayteealao.isometric.sample
---
- launchApp:
    clearState: true
- tapOn: "Interaction API"
- waitForAnimationToEnd
- tapOn: "Long Press"
- waitForAnimationToEnd
- takeScreenshot: ".ai/workflows/depth-sort-shared-edge-overpaint/verify-evidence/maestro-longpress-before"
- longPressOn:
    point: "50%,55%"
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: ".ai/workflows/depth-sort-shared-edge-overpaint/verify-evidence/maestro-longpress-after-press"
